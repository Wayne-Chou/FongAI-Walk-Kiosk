<!doctype html>
<html lang="zh-TW">
  <head>
    <meta charset="UTF-8" />
    <meta
      name="viewport"
      content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no"
    />
    <title>FongAI - 選擇測驗</title>
    <!-- Font Awesome -->
    <link
      rel="stylesheet"
      href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.2/css/all.min.css"
    />
    <!-- Google Fonts -->
    <link
      href="https://fonts.googleapis.com/css2?family=Noto+Sans+TC:wght@300;400;500;700&family=Roboto+Mono&display=swap"
      rel="stylesheet"
    />
    <style>
      :root {
        --base-bg: #ffffff;
        --page-bg: #f3f4f6;
        --main-text: #1e293b;
        --sub-text: #94a3b8;
        --brand-blue: #2563eb;
        --border-light: #e5e7eb;
        --shadow-color: #e5e7eb;
      }

      * {
        margin: 0;
        padding: 0;
        box-sizing: border-box;
        font-family: "Noto Sans TC", sans-serif;
        -webkit-tap-highlight-color: transparent;
        border-radius: 0 !important; /* 強制全直角 */
      }

      body {
        background-color: var(--page-bg);
        color: var(--main-text);
        height: 100vh;
        width: 100vw;
        overflow: hidden;
        display: flex;
        align-items: center;
        justify-content: center;
      }

      .page-wrapper {
        position: relative;
        width: 100%;
        height: 100%;
        display: flex;
        align-items: center;
        justify-content: center;
        background-color: var(--page-bg);
      }

      /* 點狀背景 */
      .page-wrapper::after {
        content: "";
        position: absolute;
        width: 100%;
        height: 100%;
        background-image: radial-gradient(
          circle at 2px 2px,
          #cbd5e1 1px,
          transparent 0
        );
        background-size: 40px 40px;
        opacity: 0.3;
        pointer-events: none;
      }

      .container {
        width: 440px;
        background: var(--base-bg);
        padding: 60px 40px;
        border: 1px solid var(--border-light);
        box-shadow: 20px 20px 0px var(--shadow-color);
        z-index: 10;
        position: relative;
      }

      /* 品牌區樣式延續 */
      .brand-header {
        margin-bottom: 40px;
        border-left: 5px solid var(--brand-blue);
        padding-left: 20px;
      }

      .brand-header h2 {
        font-size: 1.5rem;
        font-weight: 700;
        letter-spacing: 1px;
        color: var(--main-text);
      }

      .brand-header p {
        color: var(--sub-text);
        font-size: 0.8rem;
        font-family: "Roboto Mono", monospace;
        text-transform: uppercase;
        margin-top: 4px;
      }

      /* 提示文字 */
      .hint-text {
        color: var(--sub-text);
        font-size: 0.9rem;
        margin-bottom: 25px;
        font-weight: 400;
        letter-spacing: 0.5px;
      }

      /* 測驗選單 */
      .test-menu {
        display: flex;
        flex-direction: column;
        gap: 20px;
      }

      /* 測驗卡片 - 延續登入按鈕的厚重工業感 */
      .test-card {
        display: flex;
        align-items: center;
        padding: 25px;
        background: var(--base-bg);
        border: 1px solid var(--border-light);
        text-decoration: none;
        transition: all 0.2s;
        position: relative;
        cursor: pointer;
        box-shadow: 8px 8px 0px var(--shadow-color);
      }

      .test-card:hover {
        border-color: var(--brand-blue);
        transform: translate(-2px, -2px);
        box-shadow: 12px 12px 0px var(--shadow-color);
      }

      .test-card:active {
        transform: translate(2px, 2px);
        box-shadow: 4px 4px 0px var(--shadow-color);
      }

      /* 藍色卡片強調色 */
      .card-walk i {
        color: var(--brand-blue);
      }

      /* 紅色卡片強調色 */
      .card-heart i {
        color: #ef4444; /* 紅色系保持區分 */
      }

      .test-card i {
        font-size: 2.2rem;
        margin-right: 20px;
        width: 40px;
        text-align: center;
      }

      .test-info {
        flex: 1;
      }

      .test-info strong {
        display: block;
        font-size: 1.1rem;
        color: var(--main-text);
        font-weight: 700;
        margin-bottom: 4px;
      }

      .test-info p {
        font-size: 0.8rem;
        color: var(--sub-text);
        margin: 0;
      }

      /* 右側小箭頭 */
      .test-card::after {
        content: "\f105";
        font-family: "Font Awesome 6 Free";
        font-weight: 900;
        color: var(--border-light);
        font-size: 1.2rem;
        transition: color 0.2s;
      }

      .test-card:hover::after {
        color: var(--brand-blue);
      }

      /* 頁腳 */
      .footer {
        margin-top: 40px;
        text-align: left;
        color: var(--sub-text);
      }

      .footer p {
        font-size: 0.7rem;
        letter-spacing: 1px;
        font-family: "Roboto Mono", monospace;
      }

      @media (max-width: 600px) {
        .container {
          width: 90%;
          padding: 40px 30px;
        }
      }
    </style>
  </head>

  <body>
    <div class="page-wrapper">
      <div class="container">
        <!-- 標題區 -->
        <div class="brand-header">
          <h2>選擇測驗項目</h2>
        </div>

        <div class="hint-text">您想進行哪項測驗？</div>

        <!-- 測驗選單 -->
        <div class="test-menu">
          <!-- 行走測驗 -->
          <a href="walk-test-menu.html" class="test-card card-walk">
            <i class="fa-solid fa-person-walking"></i>
            <div class="test-info">
              <strong>行走測驗</strong>
              <p>步態分析與平衡評估</p>
            </div>
          </a>

          <!-- 心律測驗 -->
          <a href="#" class="test-card card-heart">
            <i class="fa-solid fa-heart-pulse"></i>
            <div class="test-info">
              <strong>心律測驗</strong>
              <p>心率監測與風險分析</p>
            </div>
          </a>
        </div>

        <!-- 頁腳 -->
        <div class="footer">
          <p>© 2026 Fong Health Technology</p>
        </div>
      </div>
    </div>
  </body>
</html>
