<!doctype html>
<html lang="zh-TW">
  <head>
    <meta charset="UTF-8" />
    <meta
      name="viewport"
      content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no"
    />
    <title>FongAI - 歡迎頁面 (直式平板專用)</title>
    <link
      href="https://fonts.googleapis.com/css2?family=Noto+Sans+TC:wght@400;500;700&display=swap"
      rel="stylesheet"
    />
    <style>
      /* ==================== 全局基礎設定 ==================== */
      * {
        margin: 0;
        padding: 0;
        box-sizing: border-box;
        font-family: "Noto Sans TC", sans-serif;
        user-select: none; /* 防止平板使用者長按畫面時跳出選取文字框 */
      }

      body,
      html {
        width: 100%;
        height: 100%;
        overflow: hidden;
        background-color: #f0f6fa;
      }

      /* 滿版平板容器 */
      .container {
        position: relative;
        width: 100%;
        height: 100%;
        padding: 30px 35px 0 35px; /* 稍微縮小上方 padding 留給新頂欄 */
        background: radial-gradient(circle at top, #e3effa 0%, #cbdff2 100%);
      }

      /* ==================== 新增：最頂端獨立官方指導列 ==================== */
      .government-top-bar {
        display: flex;
        align-items: center;

        gap: 15px;
        width: 100%;
        margin-bottom: 20px; /* 與下方天氣列拉開距離 */
        padding: 10px 0;
      }

      .gov-logo-zone {
        height: 55px; /* 獨立之後可以放得更大、更完整 */
        display: flex;
        align-items: center;
      }

      .gov-logo-zone img {
        height: 100%;
        width: auto;
        object-fit: contain;
      }

      /* ==================== 頂部資訊列 (退居第二層，純放天氣與時間) ==================== */
      .top-info-bar {
        display: flex;
        justify-content: space-between;
        align-items: center;
        width: 100%;
        background: rgba(255, 255, 255, 0.8);
        border: 1px solid rgba(255, 255, 255, 0.6);
        border-radius: 16px;
        padding: 12px 25px;
        box-shadow: 0 8px 20px rgba(164, 185, 206, 0.2);
        backdrop-filter: blur(10px);
        margin-bottom: 30px;
      }

      .weather-box {
        display: flex;
        align-items: center;
      }

      .weather-icon {
        font-size: 2.2rem; /* 微幅縮小以符合第二層的精緻感 */
        margin-right: 10px;
        animation: float 4s ease-in-out infinite;
      }

      .weather-text {
        display: block;
        font-size: 0.95rem;
        color: #5a6e85;
        font-weight: 500;
      }

      .weather-temp {
        display: block;
        font-size: 1.8rem;
        font-weight: 700;
        color: #2c3e50;
        line-height: 1.1;
      }

      .time-box {
        text-align: right;
        color: #4a5d73;
      }

      .date-text {
        font-size: 1.15rem;
        font-weight: 700;
        letter-spacing: 1px;
        margin-bottom: 2px;
      }

      .clock-text {
        font-size: 0.95rem;
        opacity: 0.85;
      }

      /* ==================== 中間核心主視覺 (數位黑板) ==================== */
      .main-board {
        display: block;
        width: 100%;
        background: #2b3647;
        border: 12px solid #5d4037;
        border-radius: 24px;
        padding: 50px 30px;
        box-shadow:
          0 20px 40px rgba(0, 0, 0, 0.25),
          inset 0 0 40px rgba(0, 0, 0, 0.5);
        position: relative;
        text-align: center;
        margin-bottom: 35px;
        min-height: 380px; /* 微調高度完美適配直式平板 */
      }
      .main-board h1 {
        color: #fff;
      }

      /* ==================== 下方品牌聯絡資訊 (主辦/系統開發) ==================== */
      .info-card {
        display: block;
        width: 100%;
        background: rgba(255, 255, 255, 0.9);
        border-radius: 20px;
        padding: 25px 30px;
        box-shadow: 0 12px 30px rgba(164, 185, 206, 0.25);
      }

      .brand-section {
        display: block;
        float: left;
        margin-top: 5px;
      }

      .logo-area {
        display: block;
        margin-bottom: 15px;
      }

      .logo-icon {
        display: inline-block;
        width: 45px;
        height: 45px;
        text-align: center;
        line-height: 45px;
        color: white;
        font-weight: 700;
        font-size: 1.4rem;
        vertical-align: middle;
        margin-right: 12px;
      }

      .logo-text {
        display: inline-block;
        font-size: 1.75rem;
        font-weight: 700;
        color: #0984e3;
        letter-spacing: 1px;
        vertical-align: middle;
      }

      .brand-description {
        display: block;
        color: #5a6e85;
        font-size: 1.05rem;
        font-weight: 500;
        margin-top: 6px;
        letter-spacing: 1px;
      }

      .qr-section {
        display: block;
        float: right;
        text-align: center;
      }

      .qr-code-wrapper {
        width: 100px;
        height: 100px;
        background: white;
        padding: 8px;
        border-radius: 12px;
        border: 1px solid #e2e8f0;
        box-shadow: 0 4px 10px rgba(0, 0, 0, 0.05);
        margin-bottom: 6px;
      }

      .qr-code-wrapper img {
        width: 100%;
        height: 100%;
      }

      .qr-hint {
        display: block;
        font-size: 0.85rem;
        color: #7f8c8d;
        font-weight: 500;
      }

      /* ==================== 滿版透明觸控層 & 提示按鈕 ==================== */
      .click-overlay {
        position: absolute;
        top: 0;
        left: 0;
        width: 100%;
        height: 100%;
        z-index: 100;
        cursor: pointer;
        background: rgba(0, 0, 0, 0.01);
      }

      .touch-prompt-container {
        position: absolute;
        width: 100%;
        bottom: 110px;
        left: 0;
        text-align: center;
      }

      .touch-prompt-btn {
        display: inline-block;
        background: linear-gradient(135deg, #ff7675, #d63031);
        color: white;
        padding: 18px 50px;
        border-radius: 50px;
        font-size: 1.65rem;
        font-weight: 700;
        letter-spacing: 2px;
        box-shadow: 0 15px 35px rgba(214, 48, 49, 0.45);
        animation: breathe 2.5s ease-in-out infinite;
        border: 2px solid rgba(255, 255, 255, 0.2);
      }

      .touch-prompt-btn span {
        display: block;
        font-size: 1.05rem;
        margin-top: 5px;
        letter-spacing: 1px;
        font-weight: 400;
        opacity: 0.9;
      }

      /* ==================== 底部固定黑條跑馬燈 ==================== */
      .footer-bar {
        color: #000;
        padding: 18px 0;
        font-size: 1.15rem;
        font-weight: 500;
        letter-spacing: 2px;
        overflow: hidden;
        white-space: nowrap;
      }

      .marquee-track {
        display: inline-block;
        padding-left: 100%;
        animation: marquee 15s linear infinite;
      }

      /* ==================== 動畫效果 ==================== */
      @keyframes marquee {
        0% {
          transform: translate3d(0, 0, 0);
        }
        100% {
          transform: translate3d(-100%, 0, 0);
        }
      }

      @keyframes breathe {
        0%,
        100% {
          transform: scale(0.96);
          box-shadow: 0 10px 25px rgba(214, 48, 49, 0.3);
        }
        50% {
          transform: scale(1.04);
          box-shadow: 0 20px 40px rgba(214, 48, 49, 0.65);
        }
      }

      @keyframes float {
        0%,
        100% {
          transform: translateY(0);
        }
        50% {
          transform: translateY(-6px);
        }
      }

      .clearfix::after {
        content: "";
        clear: both;
        display: table;
      }
    </style>
  </head>
  <body>
    <div class="container">
      <!-- 【第 1 層】全新：獨立大氣的官方合作單位列 -->
      <div class="government-top-bar">
        <div class="gov-logo-zone">
          <img src="assets/NTPC_Health.png" alt="新北市政府衛生局" />
        </div>
      </div>
      <!-- 底部跑馬燈 -->
      <div class="footer-bar">
        <div class="marquee-track">建豐健康科技 ，關心您的健康！</div>
      </div>
      <!-- 【第 2 層】純放：日常生活資訊（天氣與即時時間） -->
      <div class="top-info-bar">
        <!-- 左：天氣資訊 -->
        <div class="weather-box">
          <div class="weather-icon">⛅</div>
          <div class="weather-status">
            <span class="weather-text">多雲時晴</span>
            <span class="weather-temp" id="tempDisplay">26°C</span>
          </div>
        </div>

        <!-- 右：即時時間 -->
        <div class="time-box">
          <div class="date-text" id="dateDisplay">2026 / 05 / 21</div>
          <div class="clock-text" id="clockDisplay">星期四 03:45 下午</div>
        </div>
      </div>

      <!-- 【第 3 層】核心影片播放區 -->
      <div class="main-board">
        <h1>放影片的地方</h1>
      </div>

      <!-- 【第 4 層】執行/主辦單位資訊卡 -->
      <div class="info-card clearfix">
        <div class="brand-section">
          <div class="logo-area">
            <div class="logo-icon">
              <img style="width: 100%" src="assets/logo.png" alt="建豐" />
            </div>

            <div class="logo-text">建豐健康科技</div>
            <span class="brand-description"
              >AI 智慧健康管理 · 步態與體態精準分析</span
            >
          </div>
        </div>

        <!-- 右側 QR Code 衛教區 -->
        <div class="qr-section">
          <div class="qr-code-wrapper">
            <img
              src="https://api.qrserver.com/v1/create-qr-code/?size=150x150&data=https://fongai.co"
              alt="QR Code"
            />
          </div>
          <span class="qr-hint">掃描看更多衛教</span>
        </div>
      </div>
    </div>

    <!-- 滿版觸控跳轉層 -->
    <div class="click-overlay" onclick="navigateToMenu()">
      <div class="touch-prompt-container">
        <div class="touch-prompt-btn">
          觸碰螢幕開始使用
          <span>Touch to Start</span>
        </div>
      </div>
    </div>

    <script>
      function updateDateTime() {
        const now = new Date();
        const year = now.getFullYear();
        const month = String(now.getMonth() + 1).padStart(2, "0");
        const date = String(now.getDate()).padStart(2, "0");
        document.getElementById("dateDisplay").textContent =
          `${year} / ${month} / ${date}`;

        const weekdays = [
          "星期日",
          "星期一",
          "星期二",
          "星期三",
          "星期四",
          "星期五",
          "星期六",
        ];
        const dayOfWeek = weekdays[now.getDay()];

        let hours = now.getHours();
        const minutes = String(now.getMinutes()).padStart(2, "0");
        const ampm = hours >= 12 ? "下午" : "上午";
        hours = hours % 12;
        hours = hours ? hours : 12;

        document.getElementById("clockDisplay").textContent =
          `${dayOfWeek} ${String(hours).padStart(2, "0")}:${minutes} ${ampm}`;
      }

      updateDateTime();
      setInterval(updateDateTime, 1000);

      function navigateToMenu() {
        location.href = "walk-test-menu.html";
      }
    </script>
  </body>
</html>
