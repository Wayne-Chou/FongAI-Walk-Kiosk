<!doctype html>
<html lang="zh-TW">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>建豐 AI - 步態分析系統</title>
    <style>
      :root {
        --panel-bg: rgba(20, 20, 25, 0.95);
        --accent-blue: #3b82f6;
        --accent-green: #22c55e;
        --accent-red: #ef4444;
        --text-main: #ffffff;
        --text-dim: #94a3b8;
        --modal-bg: #1e1e24;
      }

      body {
        margin: 0;
        padding: 0;
        display: flex;
        height: 100vh;
        background: #000;
        font-family: "PingFang TC", "Microsoft JhengHei", sans-serif;
        color: var(--text-main);
        overflow: hidden;
      }

      /* 佈局面板 */
      .left-panel,
      .right-panel {
        width: 320px;
        background: var(--panel-bg);
        display: flex;
        flex-direction: column;
        padding: 40px 30px;
        z-index: 10;
      }
      .left-panel {
        border-right: 1px solid #333;
      }
      .right-panel {
        border-left: 1px solid #333;
      }

      .camera-view {
        flex: 1;
        position: relative;
        background: #1a1a1a;
        overflow: hidden;
        display: flex;
        justify-content: center;
        align-items: center;
      }

      h2 {
        font-size: 26px;
        margin-bottom: 30px;
        border-bottom: 2px solid var(--accent-blue);
        padding-bottom: 10px;
        letter-spacing: 2px;
      }

      /* 步驟清單 */
      .step-list {
        list-style: none;
        padding: 0;
        margin: 0;
      }
      .step-item {
        margin-bottom: 30px;
        display: flex;
        align-items: center;
        font-size: 20px;
        color: var(--text-dim);
      }
      .step-item.active {
        color: var(--text-main);
        transform: translateX(10px);
        font-weight: bold;
      }
      .step-item.completed {
        color: var(--accent-green);
      }

      .step-icon {
        width: 36px;
        height: 36px;
        border: 2px solid #444;
        border-radius: 50%;
        display: flex;
        justify-content: center;
        align-items: center;
        margin-right: 15px;
        font-size: 18px;
        font-weight: bold;
      }
      .active .step-icon {
        background: var(--accent-blue);
        border-color: var(--accent-blue);
        color: #fff;
      }
      .completed .step-icon {
        background: var(--accent-green);
        border-color: var(--accent-green);
        color: #fff;
        text-shadow: 1px 1px 2px rgba(0, 0, 0, 0.5);
      }

      /* --- 教學彈窗強化版 --- */
      .modal-overlay {
        position: fixed;
        inset: 0;
        background: rgba(0, 0, 0, 0.9);
        display: flex;
        justify-content: center;
        align-items: center;
        z-index: 100;
        transition: opacity 0.3s;
      }
      .modal-content {
        background: var(--modal-bg);
        /* width: 800px; */
        padding: 40px;
        border-radius: 30px;
        border: 1px solid #444;
        box-shadow: 0 30px 60px rgba(0, 0, 0, 0.8);
      }
      .modal-header {
        text-align: center;
        margin-bottom: 30px;
      }
      .modal-header h3 {
        font-size: 32px;
        color: var(--accent-blue);
        margin: 0;
      }

      /* 圖文對照區 */
      .tutorial-container {
        display: grid;
        grid-template-columns: 1fr 1.2fr;
        gap: 30px;
        margin-bottom: 30px;
      }

      .tutorial-visual {
        background: #2a2a32;
        border-radius: 20px;
        display: flex;
        justify-content: center;
        align-items: center;
        /* height: 300px; */
        border: 2px solid #333;
        position: relative;
      }

      /* 模擬圖片的佔位符 (你之後可以換成 <img>) */
      .visual-placeholder {
        width: 100%;
        height: 100%;
        display: flex;
        flex-direction: column;
        justify-content: center;
        align-items: center;
        color: var(--accent-blue);
      }
      .visual-placeholder img {
        width: 100%;
        height: auto;
      }
      .tutorial-steps {
        display: flex;
        flex-direction: column;
        justify-content: center;
      }
      .t-step {
        margin-bottom: 18px;
        font-size: 50px;
        display: flex;
        align-items: flex-start;
        color: #ddd;
      }
      .t-step b {
        color: var(--accent-blue);
        margin-right: 12px;
        font-size: 50px;
      }

      .modal-footer {
        border-top: 1px solid #333;
        padding-top: 25px;
        text-align: center;
      }

      /* 下方按鈕與勾選 */
      .checkbox-container {
        margin-top: 15px;
        display: flex;
        align-items: center;
        justify-content: center;
        color: var(--text-dim);
        font-size: 16px;
        cursor: pointer;
      }
      .checkbox-container input {
        margin-right: 10px;
        width: 20px;
        height: 20px;
      }

      /* 核心 UI 元素 */
      .status-card {
        background: rgba(255, 255, 255, 0.05);
        padding: 25px;
        border-radius: 16px;
        margin-top: 20px;
        text-align: center;
      }
      .status-value {
        font-size: 30px;
        font-weight: bold;
        color: var(--accent-blue);
      }

      .floor-target {
        position: absolute;
        bottom: 80px;
        width: 420px;
        height: 170px;
        border: 5px dashed rgba(255, 255, 255, 0.3);
        border-radius: 50%;
        transform: rotateX(60deg);
        transition: all 0.5s ease;
      }
      .floor-target.correct {
        border-color: var(--accent-green);
        border-style: solid;
        background: radial-gradient(
          circle,
          rgba(34, 197, 94, 0.2) 0%,
          transparent 70%
        );
        box-shadow:
          0 0 40px var(--accent-green),
          inset 0 0 20px var(--accent-green);
        animation: breathe 2s infinite ease-in-out;
      }
      @keyframes breathe {
        0%,
        100% {
          opacity: 0.6;
          transform: rotateX(60deg) scale(1);
        }
        50% {
          opacity: 1;
          transform: rotateX(60deg) scale(1.05);
        }
      }

      .finish-line {
        position: absolute;
        top: 25%;
        width: 500px;
        height: 60px;
        background: linear-gradient(to top, var(--accent-green), transparent);
        border-bottom: 4px solid var(--accent-green);
        opacity: 0;
        transform: rotateX(45deg);
        transition: all 0.8s ease;
        display: flex;
        justify-content: center;
        align-items: flex-end;
        padding-bottom: 10px;
        color: white;
        font-weight: bold;
        font-size: 24px;
        letter-spacing: 4px;
        text-shadow: 0 0 10px var(--accent-green);
      }
      .finish-line.show {
        opacity: 0.7;
      }

      .countdown {
        position: absolute;
        font-size: 200px;
        font-weight: 900;
        color: white;
        display: none;
        z-index: 20;
        text-shadow: 0 10px 40px rgba(0, 0, 0, 0.8);
      }
      .recording-border {
        position: absolute;
        inset: 0;
        border: 0px solid var(--accent-red);
        pointer-events: none;
        z-index: 5;
        transition: border-width 0.3s;
      }
      .is-recording .recording-border {
        border-width: 12px;
        animation: blink 1.5s infinite;
      }
      @keyframes blink {
        50% {
          opacity: 0.4;
        }
      }

      .btn {
        padding: 22px;
        font-size: 22px;
        font-weight: bold;
        background: var(--accent-blue);
        color: white;
        border: none;
        border-radius: 15px;
        cursor: pointer;
        transition: 0.3s;
      }
      .btn:disabled {
        background: #334155;
        cursor: not-allowed;
      }
      .btn-full {
        width: 100%;
        margin-top: auto;
      }
      .btn-modal {
        width: 300px;
      }
      .result-btn {
        position: relative;

        width: 100%;
        margin-bottom: 20px;

        padding: 22px;

        font-size: 24px;
        font-weight: bold;

        border: none;
        border-radius: 18px;

        cursor: pointer;

        color: white;

        background: linear-gradient(135deg, #22c55e, #16a34a);

        box-shadow: 0 10px 30px rgba(34, 197, 94, 0.3);

        transition: all 0.3s ease;

        overflow: visible;
      }

      /* Hover */
      .result-btn:hover {
        transform: translateY(-2px);
      }

      /* 手指 */
      .result-btn::before {
        content: "👆";

        position: absolute;

        right: -55px;
        top: 50%;

        font-size: 46px;

        transform: translateY(-50%);

        animation: fingerClick 1.2s infinite ease-in-out;

        pointer-events: none;
      }

      /* 點擊波紋 */
      .result-btn::after {
        content: "";

        position: absolute;

        right: 18px;
        top: 50%;

        width: 18px;
        height: 18px;

        border-radius: 50%;

        background: rgba(255, 255, 255, 0.8);

        transform: translateY(-50%) scale(0);

        animation: clickRipple 1.2s infinite;

        pointer-events: none;
      }

      /* 手指點擊動畫 */
      @keyframes fingerClick {
        0% {
          transform: translateY(-50%) translateX(0);
        }

        40% {
          transform: translateY(-50%) translateX(-18px);
        }

        55% {
          transform: translateY(-50%) translateX(-18px) scale(0.92);
        }

        100% {
          transform: translateY(-50%) translateX(0);
        }
      }

      /* 波紋動畫 */
      @keyframes clickRipple {
        0% {
          opacity: 0;
          transform: translateY(-50%) scale(0);
        }

        40% {
          opacity: 0;
          transform: translateY(-50%) scale(0);
        }

        55% {
          opacity: 0.8;
          transform: translateY(-50%) scale(1);
        }

        100% {
          opacity: 0;
          transform: translateY(-50%) scale(3);
        }
      }

      .hidden {
        display: none !important;
      }
    </style>
  </head>
  <body>
    <!-- 教學彈窗：左圖右文 -->
    <div class="modal-overlay" id="tutorialModal">
      <div class="modal-content">
        <div class="modal-header">
          <h3>步態分析 - 操作教學</h3>
        </div>

        <div class="tutorial-container">
          <!-- 左側：示意圖區 -->
          <div class="tutorial-visual">
            <div class="visual-placeholder">
              <img src="./assets/teach.png" alt="" />
            </div>
          </div>

          <!-- 右側：文字說明 -->
          <div class="tutorial-steps">
            <div class="t-step"><b>1</b> 站入地面的虛線圓圈內。</div>
            <div class="t-step"><b>2</b> 當圓圈轉為綠色，請保持不動。</div>
            <div class="t-step"><b>3</b> 倒數結束後，請正常向前直走。</div>
            <div class="t-step"><b>4</b> 走到遠處綠線位置即完成測試。</div>
          </div>
        </div>

        <div class="modal-footer">
          <button class="btn btn-modal" onclick="closeTutorial()">
            我準備好了，開始測試
          </button>
          <label class="checkbox-container">
            <input type="checkbox" id="dontShowAgain" /> 下次不再顯示此教學
          </label>
        </div>
      </div>
    </div>

    <!-- 主 UI 面板 -->
    <div class="left-panel">
      <h2>操作流程</h2>
      <div class="step-list">
        <div id="step0" class="step-item active">
          <div class="step-icon">1</div>
          準備開始
        </div>
        <div id="step1" class="step-item">
          <div class="step-icon">2</div>
          人體對位
        </div>
        <div id="step2" class="step-item">
          <div class="step-icon">3</div>
          準備起步
        </div>
        <div id="step3" class="step-item">
          <div class="step-icon">4</div>
          行走測試
        </div>
      </div>
      <button class="result-btn hidden" id="resultBtn">查看結果</button>
      <button class="btn btn-full" id="startBtn">開始測試</button>
    </div>

    <div class="camera-view" id="cameraView">
      <div class="recording-border"></div>
      <div class="countdown" id="cd">3</div>
      <div class="finish-line" id="finishLine">GOAL 終點位置</div>
      <div class="floor-target" id="target"></div>
    </div>

    <div class="right-panel">
      <h2>系統狀態</h2>
      <div class="status-card">
        <div class="status-title">當前狀態</div>
        <div class="status-value" id="statusVal">待機中</div>
      </div>
      <div class="status-card" id="guideCard" style="display: none">
        <div class="status-title">位置引導</div>
        <div class="status-value" id="guideVal" style="color: #f59e0b">
          請進入畫面
        </div>
      </div>

      <div
        style="
          margin-top: auto;
          color: var(--text-dim);
          font-size: 14px;
          text-align: center;
        "
      >
        FongAI 建豐健康科技<br />Professional v2.1.0
      </div>
    </div>

    <script>
      const btn = document.getElementById("startBtn");
      const statusVal = document.getElementById("statusVal");
      const guideCard = document.getElementById("guideCard");
      const guideVal = document.getElementById("guideVal");
      const target = document.getElementById("target");
      const finishLine = document.getElementById("finishLine");
      const cd = document.getElementById("cd");
      const cameraView = document.getElementById("cameraView");
      const modal = document.getElementById("tutorialModal");
      const resultBtn = document.getElementById("resultBtn");
      // 載入檢查
      window.onload = () => {
        if (localStorage.getItem("fongai_skip_tutorial") === "true") {
          modal.classList.add("hidden");
        }
      };

      function closeTutorial() {
        if (document.getElementById("dontShowAgain").checked) {
          localStorage.setItem("fongai_skip_tutorial", "true");
        }
        modal.style.opacity = "0";
        setTimeout(() => modal.classList.add("hidden"), 300);
      }

      function setStep(index) {
        document.querySelectorAll(".step-item").forEach((item, i) => {
          item.classList.toggle("active", i === index);
          item.classList.toggle("completed", i < index);
        });
      }

      async function startFlow() {
        btn.disabled = true;
        btn.innerText = "請照指示操作";
        resultBtn.classList.add("hidden");
        setStep(1);
        statusVal.innerText = "對位中";
        guideCard.style.display = "block";
        guideVal.innerText = "請站入圓圈";

        await new Promise((r) => setTimeout(r, 2000));
        guideVal.innerText = "請往後退一步";

        await new Promise((r) => setTimeout(r, 2000));
        target.classList.add("correct");
        guideVal.innerText = "位置正確！";
        guideVal.style.color = "var(--accent-green)";

        await new Promise((r) => setTimeout(r, 1000));
        setStep(2);
        statusVal.innerText = "準備起步";
        finishLine.classList.add("show");
        guideVal.innerText = "請準備向前直走";
        guideVal.style.color = "white";

        cd.style.display = "block";
        for (let i = 3; i > 0; i--) {
          cd.innerText = i;
          await new Promise((r) => setTimeout(r, 1000));
        }
        cd.style.display = "none";

        setStep(3);
        statusVal.innerText = "測試進行中";
        statusVal.style.color = "var(--accent-red)";
        cameraView.classList.add("is-recording");
        guideVal.innerText = "請直走至終點位置";

        await new Promise((r) => setTimeout(r, 4500));

        cameraView.classList.remove("is-recording");
        finishLine.classList.remove("show");
        statusVal.innerText = "測試完成";
        resultBtn.classList.remove("hidden");
        statusVal.style.color = "var(--accent-green)";
        guideVal.innerText = "請回到螢幕前方";

        btn.disabled = false;
        btn.innerText = "重新開始";

        target.classList.remove("correct");

        await new Promise((r) => setTimeout(r, 4000));
        setStep(0);
        guideCard.style.display = "none";
        statusVal.innerText = "待機中";
        statusVal.style.color = "var(--accent-blue)";
      }

      btn.onclick = startFlow;
    </script>
  </body>
</html>
