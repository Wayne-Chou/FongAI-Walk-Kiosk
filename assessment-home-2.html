<!doctype html>
<html lang="zh-TW">
  <head>
    <meta charset="UTF-8" />
    <meta
      name="viewport"
      content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no"
    />
    <title>FongAI - 智能鑑測首頁</title>
    <link
      rel="stylesheet"
      href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.2/css/all.min.css"
    />
    <link
      href="https://fonts.googleapis.com/css2?family=Noto+Sans+TC:wght@400;500;700;800&display=swap"
      rel="stylesheet"
    />
    <style>
      :root {
        --primary: #6f4e37;
        --primary-dark: #4e342e;
        --secondary: #8a6a4f;
        --secondary-light: #a07e5e;
        --nhi-start: #b89a7e;
        --nhi-end: #8a6a4f;
        --text-light: #8a7d6f;
        --shadow-lg: 0 24px 60px rgba(60, 40, 28, 0.12);
      }
      *,
      *::before,
      *::after {
        margin: 0;
        padding: 0;
        box-sizing: border-box;
        -webkit-tap-highlight-color: transparent;
      }
      body {
        font-family: "Noto Sans TC", sans-serif;
      }
      body {
        width: 100vw;
        height: 100vh;
        overflow: hidden;
        display: flex;
        align-items: center;
        justify-content: center;
        background: #f3efe9;
      }
      .tablet-shell {
        width: 920px;
        height: 600px;
        background: rgba(255, 255, 255, 0.65);
        border: 1px solid rgba(255, 255, 255, 0.7);
        overflow: hidden;
        box-shadow: var(--shadow-lg);
        backdrop-filter: blur(20px);
        display: flex;
        flex-direction: column;
        justify-content: space-between;
        padding: 40px 48px;
        position: relative;
      }
      .tablet-shell::before {
        content: "";
        position: absolute;
        width: 300px;
        height: 300px;
        border-radius: 50%;
        background: linear-gradient(
          135deg,
          rgba(111, 78, 55, 0.05),
          rgba(160, 126, 94, 0.05)
        );
        top: -50px;
        left: -50px;
        pointer-events: none;
      }

      /* ── Header ── */
      .app-header {
        display: flex;
        justify-content: space-between;
        align-items: center;
        z-index: 1;
      }
      .brand-mark {
        display: flex;
        align-items: center;
        gap: 14px;
      }
      .logo-box {
        width: 52px;
        height: 52px;
        border-radius: 50%;
        background: linear-gradient(
          135deg,
          var(--primary),
          var(--primary-dark)
        );
        display: grid;
        place-items: center;
        box-shadow: 0 8px 18px rgba(111, 78, 55, 0.18);
      }
      .logo-box img {
        width: 28px;
        height: auto;
      }
      .brand-mark h1 {
        font-size: 1.8rem;
        font-weight: 800;
        color: var(--primary);
        letter-spacing: 0.5px;
      }

      /* 右側文字區 */
      .six-text {
        padding: 0 16px 0 12px;
        display: flex;
        flex-direction: column;
        align-items: flex-start;
        gap: 1px;
      }
      .six-text-main {
        font-size: 0.95rem;
        font-weight: 800;
        color: #6f4e37;
        letter-spacing: 2px;
        line-height: 1.2;
      }
      .six-text-sub {
        font-size: 0.68rem;
        font-weight: 500;
        color: #8a7d6f;
        letter-spacing: 1px;
      }

      /* ── 主區域 ── */
      .main-action-area {
        flex-grow: 1;
        display: flex;
        flex-direction: column;
        justify-content: center;
        align-items: center;
        gap: 24px;
        z-index: 1;
      }
      .welcome-meta {
        text-align: center;
      }
      .welcome-meta h2 {
        font-size: 1.8rem;
        font-weight: 800;
        color: var(--primary);
        letter-spacing: 0.5px;
      }

      /* ── 雙圓並排 ── */
      .dual-btn-row {
        display: flex;
        align-items: center;
        gap: 56px;
      }
      .btn-entry {
        width: 160px;
        height: 160px;
        border-radius: 50%;
        border: none;
        color: #fff;
        display: flex;
        flex-direction: column;
        align-items: center;
        justify-content: center;
        gap: 12px;
        cursor: pointer;
        transition:
          transform 0.2s ease,
          box-shadow 0.2s ease;
      }
      .btn-entry i {
        font-size: 2.6rem;
        text-shadow: 0 4px 10px rgba(0, 0, 0, 0.15);
      }
      .btn-entry span {
        font-size: 0.9rem;
        font-weight: 800;
        letter-spacing: 2px;
        text-indent: 2px;
        text-shadow: 0 2px 6px rgba(0, 0, 0, 0.15);
        text-align: center;
        line-height: 1.4;
      }
      .btn-entry:hover {
        transform: scale(1.06);
      }
      .btn-entry:active {
        transform: scale(0.95);
      }

      .btn-start {
        background: linear-gradient(
          135deg,
          var(--primary),
          var(--primary-dark)
        );
        box-shadow: 0 16px 40px rgba(111, 78, 55, 0.3);
      }
      .btn-start:hover {
        box-shadow: 0 22px 48px rgba(111, 78, 55, 0.42);
      }

      .btn-nhi {
        background: linear-gradient(135deg, var(--nhi-start), var(--nhi-end));
        box-shadow: 0 16px 40px rgba(138, 106, 79, 0.32);
      }
      .btn-nhi:hover {
        box-shadow: 0 22px 48px rgba(138, 106, 79, 0.45);
      }

      /* ── 中間分隔「或」 ── */
      .divider-or {
        display: flex;
        flex-direction: column;
        align-items: center;
        gap: 8px;
        user-select: none;
      }
      .divider-or::before,
      .divider-or::after {
        content: "";
        width: 2px;
        height: 40px;
        background: #6f4e37;
        opacity: 0.3;
      }
      .divider-or-text {
        font-size: 1.6rem;
        font-weight: 800;
        color: #6f4e37;
        width: 50px;
        height: 50px;
        display: flex;
        align-items: center;
        justify-content: center;
        border-radius: 50%;
        background: rgba(111, 78, 55, 0.07);
        border: 2px solid rgba(111, 78, 55, 0.25);
      }

      /* ── 頁尾 ── */
      .footer-info {
        color: var(--text-light);
        font-size: 0.82rem;
        text-align: center;
        z-index: 1;
      }
    </style>
  </head>
  <body>
    <div class="tablet-shell">
      <header class="app-header">
        <div class="brand-mark">
          <div class="logo-box">
            <img
              src="/assets/logo.png"
              alt="Logo"
              onerror="this.style.display = 'none'"
            />
          </div>
          <h1>FongAI</h1>
        </div>
      </header>

      <main class="main-action-area">
        <div class="welcome-meta">
          <h2>您好，歡迎使用 FongAI</h2>
        </div>

        <div class="dual-btn-row">
          <button class="btn-entry btn-start">
            <i class="fa-solid fa-circle-play"></i>
            <span>手動登入</span>
          </button>

          <div class="divider-or">
            <div class="divider-or-text">或</div>
          </div>

          <button class="btn-entry btn-nhi">
            <i class="fa-solid fa-id-card"></i>
            <span>健保卡登入</span>
          </button>
        </div>
      </main>

      <footer class="footer-info">© 2026 Fong Health Technology // v2.0</footer>
    </div>
  </body>
</html>
