<!doctype html>
<html lang="zh-TW">
  <head>
    <meta charset="UTF-8" />
    <meta
      name="viewport"
      content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no"
    />
    <title>基本資料填寫 - FongAI</title>
    <!-- Font Awesome -->
    <link
      rel="stylesheet"
      href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.2/css/all.min.css"
    />
    <!-- Google Fonts -->
    <link
      href="https://fonts.googleapis.com/css2?family=Noto+Sans+TC:wght@300;400;500;700&family=Roboto+Mono&display=swap"
      rel="stylesheet"
    />
    <style>
      :root {
        --base-bg: #ffffff;
        --page-bg: #f3f4f6;
        --main-text: #1e293b;
        --sub-text: #94a3b8;
        --brand-blue: #2563eb;
        --border-light: #e5e7eb;
        --input-focus: #f8fafc;
      }

      * {
        margin: 0;
        padding: 0;
        box-sizing: border-box;
        font-family: "Noto Sans TC", sans-serif;
        -webkit-tap-highlight-color: transparent;
        border-radius: 0 !important;
      }

      body {
        background-color: var(--page-bg);
        color: var(--main-text);
        height: 100vh;
        width: 100vw;
        overflow: hidden;
        display: flex;
        align-items: center;
        justify-content: center;
      }

      .profile-page {
        position: relative;
        width: 100%;
        height: 100%;
        display: flex;
        align-items: center;
        justify-content: center;
        background-color: var(--page-bg);
      }

      .profile-page::after {
        content: "";
        position: absolute;
        width: 100%;
        height: 100%;
        background-image: radial-gradient(
          circle at 2px 2px,
          #cbd5e1 1px,
          transparent 0
        );
        background-size: 40px 40px;
        opacity: 0.3;
        pointer-events: none;
      }

      .profile-card {
        width: 720px;
        background: var(--base-bg);
        padding: 40px 45px;
        border: 1px solid var(--border-light);
        box-shadow: 20px 20px 0px #e5e7eb;
        z-index: 10;
      }

      .brand-mini {
        margin-bottom: 30px;
        border-left: 5px solid var(--brand-blue);
        padding-left: 20px;
      }

      .brand-mini h1 {
        font-size: 1.5rem;
        font-weight: 700;
        letter-spacing: 1px;
      }

      .brand-mini p {
        color: var(--sub-text);
        font-size: 0.75rem;
        font-family: "Roboto Mono", monospace;
      }

      h2 {
        font-size: 1.2rem;
        font-weight: 700;
        margin-bottom: 25px;
        color: var(--main-text);
      }

      .form-grid {
        display: grid;
        grid-template-columns: 1fr 1fr;
        gap: 20px;
        margin-bottom: 20px;
      }

      .full-width {
        grid-column: span 2;
      }

      label {
        display: block;
        font-size: 0.85rem;
        font-weight: 700;
        color: var(--main-text);
        margin-bottom: 8px;
      }

      .input-wrapper {
        position: relative;
        display: flex;
        align-items: center;
      }

      .input-wrapper i {
        position: absolute;
        left: 15px;
        color: var(--sub-text);
        font-size: 0.9rem;
      }

      input[type="text"],
      input[type="email"],
      input[type="date"] {
        width: 100%;
        padding: 14px 15px 14px 45px;
        background: transparent;
        border: 1px solid var(--border-light);
        color: var(--main-text);
        font-size: 1rem;
        outline: none;
        transition: all 0.2s;
      }

      input:focus {
        border-color: var(--brand-blue);
        background-color: var(--input-focus);
      }

      /* --- 性別選擇器優化區域 --- */
      .gender-selector {
        display: grid;
        grid-template-columns: 1fr 1fr;
        gap: 20px;
        margin-top: 5px;
      }

      .gender-option {
        cursor: pointer;
        position: relative;
      }

      .gender-option input {
        position: absolute;
        opacity: 0;
      }

      .gender-btn {
        display: flex;
        align-items: center;
        padding: 20px;
        border: 1px solid var(--border-light);
        background: #fafafa;
        transition: all 0.2s ease;
        position: relative;
      }

      /* 模擬 Radio 圓點 */
      .radio-dot {
        width: 24px;
        height: 24px;
        border: 2px solid var(--sub-text);
        border-radius: 50% !important; /* 唯獨圓點保持圓形 */
        margin-right: 15px;
        position: relative;
        flex-shrink: 0;
        transition: all 0.2s;
      }

      .radio-dot::after {
        content: "";
        position: absolute;
        width: 12px;
        height: 12px;
        background: var(--brand-blue);
        border-radius: 50% !important;
        top: 50%;
        left: 50%;
        transform: translate(-50%, -50%) scale(0);
        transition: transform 0.2s cubic-bezier(0.175, 0.885, 0.32, 1.275);
      }

      .gender-info {
        display: flex;
        align-items: center;
        gap: 10px;
      }

      .gender-info i {
        font-size: 1.2rem;
        color: var(--sub-text);
      }

      .gender-info span {
        font-weight: 700;
        font-size: 1.1rem;
        color: var(--sub-text);
      }

      /* 選中狀態 */
      .gender-option input:checked + .gender-btn {
        border: 2px solid var(--brand-blue);
        background-color: #eff6ff;
        box-shadow: 0 4px 12px rgba(37, 99, 235, 0.1);
      }

      .gender-option input:checked + .gender-btn .radio-dot {
        border-color: var(--brand-blue);
      }

      .gender-option input:checked + .gender-btn .radio-dot::after {
        transform: translate(-50%, -50%) scale(1);
      }

      .gender-option input:checked + .gender-btn .gender-info i,
      .gender-option input:checked + .gender-btn .gender-info span {
        color: var(--brand-blue);
      }

      /* --- 按鈕與頁尾 --- */
      .btn-submit {
        width: 100%;
        padding: 20px;
        margin-top: 25px;
        background: var(--main-text);
        border: none;
        color: #ffffff;
        font-size: 1.2rem;
        font-weight: 700;
        cursor: pointer;
        letter-spacing: 4px;
        transition: all 0.2s;
      }

      .btn-submit:hover {
        background: var(--brand-blue);
      }

      .btn-submit:active {
        transform: scale(0.99);
      }

      @media (max-width: 768px) {
        .profile-card {
          width: 92%;
          padding: 30px 25px;
        }
        .form-grid {
          grid-template-columns: 1fr;
        }
        .full-width {
          grid-column: span 1;
        }
        .gender-selector {
          grid-template-columns: 1fr;
          gap: 10px;
        }
      }
    </style>
  </head>

  <body>
    <div class="profile-page">
      <div class="profile-card">
        <div class="brand-mini">
          <h1>FongAI</h1>
          <p>Walk Analysis System</p>
        </div>

        <h2>基本資料填寫</h2>

        <div class="form-grid">
          <!-- 姓名 -->
          <div class="form-group">
            <label>姓名 Name</label>
            <div class="input-wrapper">
              <i class="fa-regular fa-user"></i>
              <input type="text" placeholder="請輸入姓名" />
            </div>
          </div>

          <!-- 電話 -->
          <div class="form-group">
            <label>聯絡電話 Phone</label>
            <div class="input-wrapper">
              <i class="fa-solid fa-phone"></i>
              <input type="text" placeholder="請輸入電話號碼" />
            </div>
          </div>

          <!-- Email -->
          <div class="form-group">
            <label>電子郵件 Email (選填)</label>
            <div class="input-wrapper">
              <i class="fa-regular fa-envelope"></i>
              <input type="email" placeholder="example@mail.com" />
            </div>
          </div>

          <!-- 生日 -->
          <div class="form-group">
            <label>出生年月日 Birth Date</label>
            <div class="input-wrapper">
              <i class="fa-solid fa-calendar-days"></i>
              <input type="date" />
            </div>
          </div>

          <!-- 性別 (優化版) -->
          <div class="form-group full-width">
            <label>性別 Gender (請點選下方按鈕)</label>
            <div class="gender-selector">
              <label class="gender-option">
                <input type="radio" name="gender" value="male" checked />
                <div class="gender-btn">
                  <div class="radio-dot"></div>
                  <div class="gender-info">
                    <i class="fa-solid fa-mars"></i>
                    <span>男生 Male</span>
                  </div>
                </div>
              </label>
              <label class="gender-option">
                <input type="radio" name="gender" value="female" />
                <div class="gender-btn">
                  <div class="radio-dot"></div>
                  <div class="gender-info">
                    <i class="fa-solid fa-venus"></i>
                    <span>女生 Female</span>
                  </div>
                </div>
              </label>
            </div>
          </div>
        </div>

        <button class="btn-submit" onclick="location.href = 'walk-test.html'">
          下一步：開始測驗
        </button>
      </div>
    </div>
  </body>
</html>
