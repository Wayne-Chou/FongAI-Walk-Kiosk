<!doctype html>
<html lang="zh-TW">
  <head>
    <meta charset="UTF-8" />
    <meta
      name="viewport"
      content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no"
    />
    <title>FongAI - 讀取成功</title>
    <link
      rel="stylesheet"
      href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.2/css/all.min.css"
    />
    <link
      href="https://fonts.googleapis.com/css2?family=Noto+Sans+TC:wght@400;500;700;800&display=swap"
      rel="stylesheet"
    />
    <style>
      :root {
        --line: #e3d7c8;
        --primary: #6f4e37;
        --primary-dark: #4e342e;
        --secondary: #8a6a4f;
        --secondary-light: #a07e5e;
        --text-dark: #2b2018;
        --text-body: #5c4d40;
        --text-light: #8a7d6f;
        --success: #16a34a;
        --success-soft: #dcfce7;
        --shadow-lg: 0 24px 60px rgba(60, 40, 28, 0.12);
      }

      * {
        margin: 0;
        padding: 0;
        box-sizing: border-box;
        font-family: "Noto Sans TC", sans-serif;
        -webkit-tap-highlight-color: transparent;
      }

      body {
        width: 100vw;
        height: 100vh;
        overflow: hidden;
        display: flex;
        align-items: center;
        justify-content: center;
        background: #f3efe9;
      }

      .tablet-shell {
        width: 920px;
        height: 600px;
        background: rgba(255, 255, 255, 0.65);
        border: 1px solid rgba(255, 255, 255, 0.7);
        overflow: hidden;
        box-shadow: var(--shadow-lg);
        backdrop-filter: blur(20px);
        display: flex;
        flex-direction: column;
        padding: 28px 40px;
        position: relative;
      }
      .tablet-shell::before {
        content: "";
        position: absolute;
        width: 320px;
        height: 320px;
        border-radius: 50%;
        background: linear-gradient(
          135deg,
          rgba(111, 78, 55, 0.05),
          rgba(160, 126, 94, 0.05)
        );
        top: -70px;
        right: -70px;
        pointer-events: none;
      }
      .tablet-shell::after {
        content: "";
        position: absolute;
        width: 260px;
        height: 260px;
        border-radius: 50%;
        background: linear-gradient(
          135deg,
          rgba(160, 126, 94, 0.05),
          rgba(111, 78, 55, 0.04)
        );
        bottom: -80px;
        left: -60px;
        pointer-events: none;
      }

      /* ── 頂部列：品牌 ── */
      .top-bar {
        display: flex;
        align-items: center;
        z-index: 1;
        flex-shrink: 0;
      }
      .brand-mark {
        display: flex;
        align-items: center;
        gap: 12px;
      }
      .logo-box {
        width: 44px;
        height: 44px;
        border-radius: 50%;
        background: linear-gradient(
          135deg,
          var(--primary),
          var(--primary-dark)
        );
        display: grid;
        place-items: center;
        box-shadow: 0 8px 18px rgba(111, 78, 55, 0.18);
      }
      .logo-box img {
        width: 24px;
        height: auto;
      }
      .brand-mark h1 {
        font-size: 1.5rem;
        font-weight: 800;
        color: var(--primary);
        letter-spacing: 0.5px;
      }

      /* ── 中央主區 ── */
      .main-stage {
        flex: 1;
        display: flex;
        flex-direction: column;
        align-items: center;
        justify-content: center;
        gap: 24px;
        z-index: 1;
      }

      /* 成功打勾 */
      .check-wrap {
        position: relative;
        width: 128px;
        height: 128px;
        display: flex;
        align-items: center;
        justify-content: center;
      }
      .check-ring {
        position: absolute;
        inset: 0;
        border-radius: 50%;
        background: var(--success-soft);
        animation: ring-pulse 2.2s infinite ease-out;
      }
      @keyframes ring-pulse {
        0% {
          transform: scale(1);
          opacity: 0.7;
        }
        70% {
          transform: scale(1.35);
          opacity: 0;
        }
        100% {
          transform: scale(1.35);
          opacity: 0;
        }
      }
      .check-circle {
        position: relative;
        width: 104px;
        height: 104px;
        border-radius: 50%;
        background: var(--success);
        display: grid;
        place-items: center;
        box-shadow: 0 14px 30px rgba(22, 163, 74, 0.32);
        transform: scale(0);
        animation: pop 0.5s cubic-bezier(0.175, 0.885, 0.32, 1.275) forwards;
      }
      @keyframes pop {
        0% {
          transform: scale(0);
        }
        100% {
          transform: scale(1);
        }
      }
      .check-circle i {
        color: #fff;
        font-size: 3.2rem;
        opacity: 0;
        animation: fade-in 0.3s ease 0.35s forwards;
      }
      @keyframes fade-in {
        to {
          opacity: 1;
        }
      }

      /* 文字 */
      .success-title {
        font-size: 2.1rem;
        font-weight: 800;
        color: var(--success);
        letter-spacing: 3px;
      }
      .success-name {
        font-size: 1.25rem;
        font-weight: 700;
        color: var(--text-dark);
      }
      .success-name b {
        color: var(--primary);
      }
      .card-reminder {
        margin-top: 6px;
        display: flex;
        align-items: center;
        gap: 10px;
        padding: 12px 22px;

        background: #fff7ed;
        border: 1.5px solid #fed7aa;
        color: #9a3412;
        font-size: 1.05rem;
        font-weight: 700;
        letter-spacing: 1px;
      }
      .card-reminder i {
        font-size: 1.3rem;
        color: #ea580c;
      }

      .success-sub {
        font-size: 0.95rem;
        color: var(--text-light);
        letter-spacing: 1px;
        display: flex;
        align-items: center;
        gap: 8px;
      }
      .dots-loading {
        display: inline-flex;
        gap: 4px;
      }
      .dots-loading span {
        width: 6px;
        height: 6px;
        border-radius: 50%;
        background: var(--secondary-light);
        animation: dot-bounce 1.2s infinite ease-in-out;
      }
      .dots-loading span:nth-child(2) {
        animation-delay: 0.15s;
      }
      .dots-loading span:nth-child(3) {
        animation-delay: 0.3s;
      }
      @keyframes dot-bounce {
        0%,
        80%,
        100% {
          opacity: 0.3;
          transform: translateY(0);
        }
        40% {
          opacity: 1;
          transform: translateY(-4px);
        }
      }

      /* ── 頁尾 ── */
      .footer-info {
        text-align: center;
        color: var(--text-light);
        font-size: 0.78rem;
        z-index: 1;
        flex-shrink: 0;
      }
    </style>
  </head>
  <body>
    <div class="tablet-shell">
      <!-- 頂部列 -->
      <header class="top-bar">
        <div class="brand-mark">
          <div class="logo-box">
            <img
              src="/assets/logo.png"
              alt="Logo"
              onerror="this.style.display = 'none'"
            />
          </div>
          <h1>FongAI</h1>
        </div>
      </header>

      <!-- 中央：成功打勾 + 訊息 -->
      <main class="main-stage">
        <div class="check-wrap">
          <div class="check-ring"></div>
          <div class="check-circle">
            <i class="fa-solid fa-check"></i>
          </div>
        </div>

        <div class="success-title">讀取成功</div>
        <div class="success-name">您好，已完成身分驗證</div>
        <div class="success-sub">
          正在為您登入
          <span class="dots-loading"
            ><span></span><span></span><span></span
          ></span>
        </div>

        <div class="card-reminder">
          <i class="fa-solid fa-id-card"></i>
          <span>請記得取出您的健保卡</span>
        </div>
      </main>

      <!-- 頁尾 -->
      <footer class="footer-info">© 2026 Fong Health Technology // v2.0</footer>
    </div>
  </body>
</html>
