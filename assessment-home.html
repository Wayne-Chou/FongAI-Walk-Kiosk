<!doctype html>
<html lang="zh-TW">
  <head>
    <meta charset="UTF-8" />
    <meta
      name="viewport"
      content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no"
    />
    <title>FongAI - 智能鑑測首頁</title>
    <link
      rel="stylesheet"
      href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.2/css/all.min.css"
    />
    <link
      href="https://fonts.googleapis.com/css2?family=Noto+Sans+TC:wght@400;500;700;800&display=swap"
      rel="stylesheet"
    />
    <style>
      :root {
        --primary: #1e3a8a;
        --primary-dark: #172554;
        --secondary: #0f766e;
        --secondary-light: #14b8a6;
        --nhi-start: #0e7490;
        --nhi-end: #0f766e;
        --text-light: #64748b;
        --shadow-lg: 0 24px 60px rgba(15, 23, 42, 0.12);
      }
      *,
      *::before,
      *::after {
        margin: 0;
        padding: 0;
        box-sizing: border-box;
        -webkit-tap-highlight-color: transparent;
      }
      body {
        font-family: "Noto Sans TC", sans-serif;
      }
      body {
        width: 100vw;
        height: 100vh;
        overflow: hidden;
        display: flex;
        align-items: center;
        justify-content: center;
        background: #f1f3f0;
      }
      .tablet-shell {
        width: 920px;
        height: 600px;
        background: rgba(255, 255, 255, 0.65);
        border: 1px solid rgba(255, 255, 255, 0.7);
        overflow: hidden;
        box-shadow: var(--shadow-lg);
        backdrop-filter: blur(20px);
        display: flex;
        flex-direction: column;
        justify-content: space-between;
        padding: 40px 48px;
        position: relative;
      }
      .tablet-shell::before {
        content: "";
        position: absolute;
        width: 300px;
        height: 300px;
        border-radius: 50%;
        background: linear-gradient(
          135deg,
          rgba(30, 58, 138, 0.04),
          rgba(20, 184, 166, 0.04)
        );
        top: -50px;
        left: -50px;
        pointer-events: none;
      }

      /* ── Header ── */
      .app-header {
        display: flex;
        justify-content: space-between;
        align-items: center;
        z-index: 1;
      }
      .brand-mark {
        display: flex;
        align-items: center;
        gap: 14px;
      }
      .logo-box {
        width: 52px;
        height: 52px;
        border-radius: 50%;
        background: linear-gradient(135deg, var(--primary), var(--secondary));
        display: grid;
        place-items: center;
        box-shadow: 0 8px 18px rgba(30, 58, 138, 0.15);
      }
      .logo-box img {
        width: 28px;
        height: auto;
      }
      .brand-mark h1 {
        font-size: 1.8rem;
        font-weight: 800;
        color: var(--primary);
        letter-spacing: 0.5px;
      }

      /* ── 量六力測驗按鈕（header 右上） ── */
      .btn-six-force {
        display: flex;
        align-items: center;
        gap: 0;
        border: 2px solid rgba(30, 58, 138, 0.2);
        background: rgba(255, 255, 255, 0.55);
        backdrop-filter: blur(8px);
        border-radius: 16px;
        padding: 0;
        cursor: pointer;
        overflow: hidden;
        box-shadow: 0 4px 16px rgba(30, 58, 138, 0.1);
        transition:
          box-shadow 0.2s,
          transform 0.2s,
          border-color 0.2s;
      }
      .btn-six-force:hover {
        transform: translateY(-2px);
        box-shadow: 0 8px 24px rgba(30, 58, 138, 0.2);
        border-color: rgba(30, 58, 138, 0.4);
      }
      .btn-six-force:active {
        transform: scale(0.97);
      }

      /* 左側 CSS 六角形 */
      .six-accent {
        width: 52px;
        height: 52px;
        display: flex;
        align-items: center;
        justify-content: center;
        flex-shrink: 0;
      }
      .hex-shape {
        width: 30px;
        height: 30px;
        background: linear-gradient(135deg, #1e3a8a, #0f766e);
        border-radius: 50%;
        display: flex;
        align-items: center;
        justify-content: center;
      }
      .hex-shape span {
        font-size: 0.75rem;
        font-weight: 900;
        color: #fff;
        letter-spacing: 0;
        font-family: "Noto Sans TC", sans-serif;
        line-height: 1;
      }

      /* 右側文字區 */
      .six-text {
        padding: 0 16px 0 12px;
        display: flex;
        flex-direction: column;
        align-items: flex-start;
        gap: 1px;
      }
      .six-text-main {
        font-size: 0.95rem;
        font-weight: 800;
        color: #1e3a8a;
        letter-spacing: 2px;
        line-height: 1.2;
      }
      .six-text-sub {
        font-size: 0.68rem;
        font-weight: 500;
        color: #64748b;
        letter-spacing: 1px;
      }

      /* ── 主區域 ── */
      .main-action-area {
        flex-grow: 1;
        display: flex;
        flex-direction: column;
        justify-content: center;
        align-items: center;
        gap: 24px;
        z-index: 1;
      }
      .welcome-meta {
        text-align: center;
      }
      .welcome-meta h2 {
        font-size: 1.8rem;
        font-weight: 800;
        color: var(--primary);
        letter-spacing: 0.5px;
      }

      /* ── 雙圓並排 ── */
      .dual-btn-row {
        display: flex;
        align-items: center;
        gap: 56px;
      }
      .btn-entry {
        width: 160px;
        height: 160px;
        border-radius: 50%;
        border: none;
        color: #fff;
        display: flex;
        flex-direction: column;
        align-items: center;
        justify-content: center;
        gap: 12px;
        cursor: pointer;
        transition:
          transform 0.2s ease,
          box-shadow 0.2s ease;
      }
      .btn-entry i {
        font-size: 2.6rem;
        text-shadow: 0 4px 10px rgba(0, 0, 0, 0.15);
      }
      .btn-entry span {
        font-size: 0.9rem;
        font-weight: 800;
        letter-spacing: 2px;
        text-indent: 2px;
        text-shadow: 0 2px 6px rgba(0, 0, 0, 0.15);
        text-align: center;
        line-height: 1.4;
      }
      .btn-entry:hover {
        transform: scale(1.06);
      }
      .btn-entry:active {
        transform: scale(0.95);
      }

      .btn-start {
        background: linear-gradient(135deg, var(--primary), var(--secondary));
        box-shadow: 0 16px 40px rgba(30, 58, 138, 0.28);
      }
      .btn-start:hover {
        box-shadow: 0 22px 48px rgba(30, 58, 138, 0.38);
      }

      .btn-nhi {
        background: linear-gradient(135deg, var(--nhi-start), var(--nhi-end));
        box-shadow: 0 16px 40px rgba(14, 116, 144, 0.28);
      }
      .btn-nhi:hover {
        box-shadow: 0 22px 48px rgba(14, 116, 144, 0.4);
      }

      /* ── 中間分隔「或」 ── */
      .divider-or {
        display: flex;
        flex-direction: column;
        align-items: center;
        gap: 8px;
        user-select: none;
      }
      .divider-or::before,
      .divider-or::after {
        content: "";
        width: 2px;
        height: 40px;
        background: #1e3a8a;
        opacity: 0.3;
      }
      .divider-or-text {
        font-size: 1.6rem;
        font-weight: 800;
        color: #1e3a8a;
        width: 50px;
        height: 50px;
        display: flex;
        align-items: center;
        justify-content: center;
        border-radius: 50%;
        background: rgba(30, 58, 138, 0.07);
        border: 2px solid rgba(30, 58, 138, 0.25);
      }

      /* ── 頁尾 ── */
      .footer-info {
        color: var(--text-light);
        font-size: 0.82rem;
        text-align: center;
        z-index: 1;
      }
    </style>
  </head>
  <body>
    <div class="tablet-shell">
      <header class="app-header">
        <div class="brand-mark">
          <div class="logo-box">
            <img
              src="/assets/logo.png"
              alt="Logo"
              onerror="this.style.display = 'none'"
            />
          </div>
          <h1>FongAI</h1>
        </div>

        <button class="btn-six-force">
          <div class="six-accent">
            <div class="hex-shape">
              <span>六</span>
            </div>
          </div>
          <div class="six-text">
            <span class="six-text-main">量六力測驗</span>
            <span class="six-text-sub">健康功能自評</span>
          </div>
        </button>
      </header>

      <main class="main-action-area">
        <div class="welcome-meta">
          <h2>您好，歡迎使用 FongAI</h2>
        </div>

        <div class="dual-btn-row">
          <button class="btn-entry btn-start">
            <i class="fa-solid fa-circle-play"></i>
            <span>填寫資料開始</span>
          </button>

          <div class="divider-or">
            <div class="divider-or-text">或</div>
          </div>

          <button class="btn-entry btn-nhi">
            <i class="fa-solid fa-id-card"></i>
            <span>插入健保卡開始</span>
          </button>
        </div>
      </main>

      <footer class="footer-info">© 2026 Fong Health Technology // v2.0</footer>
    </div>
  </body>
</html>
