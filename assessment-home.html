<!doctype html>
<html lang="zh-TW">
  <head>
    <meta charset="UTF-8" />
    <meta
      name="viewport"
      content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no"
    />
    <title>FongAI - 智能鑑測首頁</title>

    <link
      rel="stylesheet"
      href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.2/css/all.min.css"
    />
    <link
      href="https://fonts.googleapis.com/css2?family=Noto+Sans+TC:wght@400;500;700;800&display=swap"
      rel="stylesheet"
    />

    <style>
      :root {
        --bg-main: #eef4fb;
        --bg-accent: #dbeafe;
        --card-bg: rgba(255, 255, 255, 0.7);
        --line: #d8e3f0;
        --primary: #1e3a8a;
        --primary-dark: #172554;
        --secondary: #0f766e;
        --secondary-light: #14b8a6;
        --text-dark: #0f172a;
        --text-body: #475569;
        --text-light: #64748b;
        --shadow-lg: 0 24px 60px rgba(15, 23, 42, 0.12);
        --shadow-md: 0 12px 28px rgba(30, 58, 138, 0.08);
      }

      * {
        margin: 0;
        padding: 0;
        box-sizing: border-box;
        font-family: "Noto Sans TC", sans-serif;
        -webkit-tap-highlight-color: transparent;
      }

      body {
        width: 100vw;
        height: 100vh;
        overflow: hidden;
        display: flex;
        align-items: center;
        justify-content: center;

        background: #f1f3f0;
      }

      /* 平板專用外殼 (不設斷點，固定尺寸) */
      .tablet-shell {
        width: 920px;
        height: 600px;
        background: rgba(255, 255, 255, 0.65);
        border: 1px solid rgba(255, 255, 255, 0.7);
        border-radius: 30px;
        overflow: hidden;
        box-shadow: var(--shadow-lg);
        backdrop-filter: blur(20px);
        display: flex;
        flex-direction: column;
        justify-content: space-between;
        padding: 40px 48px;
        position: relative;
      }

      /* 背景裝飾流體光圈 - 呼應登入頁風格 */
      .tablet-shell::before {
        content: "";
        position: absolute;
        width: 300px;
        height: 300px;
        border-radius: 50%;
        background: linear-gradient(
          135deg,
          rgba(30, 58, 138, 0.04),
          rgba(20, 184, 166, 0.04)
        );
        top: -50px;
        left: -50px;
        pointer-events: none;
      }

      /* 頂部導覽列 */
      .app-header {
        display: flex;
        justify-content: space-between;
        align-items: center;
        z-index: 1;
      }

      .brand-mark {
        display: flex;
        align-items: center;
        gap: 14px;
      }

      .logo-box {
        width: 52px;
        height: 52px;
        border-radius: 50%;
        background: linear-gradient(135deg, var(--primary), var(--secondary));
        display: grid;
        place-items: center;
        box-shadow: 0 8px 18px rgba(30, 58, 138, 0.15);
      }

      .logo-box img {
        width: 28px;
        height: auto;
      }

      .brand-mark h1 {
        font-size: 1.8rem;
        font-weight: 800;
        color: var(--primary);
        letter-spacing: 0.5px;
      }

      .btn-logout {
        background: rgba(255, 255, 255, 0.6);
        border: 1px solid var(--input-border);
        color: var(--text-body);
        padding: 10px 20px;
        border-radius: 14px;
        font-size: 0.9rem;
        font-weight: 700;
        cursor: pointer;
        display: flex;
        align-items: center;
        gap: 8px;
        transition: all 0.2s ease;
        backdrop-filter: blur(5px);
      }

      .btn-logout:hover {
        background: #ffffff;
        color: #ef4444;
        border-color: #fca5a5;
        transform: translateY(-1px);
        box-shadow: var(--shadow-md);
      }

      /* 核心集中區域 */
      .main-action-area {
        flex-grow: 1;
        display: flex;
        flex-direction: column;
        justify-content: center;
        align-items: center;
        gap: 28px;
        z-index: 1;
      }

      .welcome-meta {
        text-align: center;
      }

      .welcome-meta h2 {
        font-size: 1.8rem;
        font-weight: 800;
        color: var(--primary);
        letter-spacing: 0.5px;
      }

      /* 核心按鈕與多重雷達擴散特效 */
      .radar-pulse-box {
        position: relative;
        display: flex;
        justify-content: center;
        align-items: center;
        margin: 20px 0;
      }

      /* 加強版：雷達無限波紋擴散動畫 */
      .pulse-ring {
        position: absolute;
        width: 170px;
        height: 170px;
        border-radius: 50%;
        background: radial-gradient(
          circle,
          rgba(20, 184, 166, 0.25) 0%,
          rgba(30, 58, 138, 0.05) 70%,
          transparent 100%
        );
        border: 1px solid rgba(20, 184, 166, 0.3);
        animation: radar-pulse-enhanced 3.2s infinite
          cubic-bezier(0.1, 0.8, 0.3, 1);
        pointer-events: none;
      }
      .pulse-ring:nth-child(2) {
        animation-delay: 0.8s;
      }
      .pulse-ring:nth-child(3) {
        animation-delay: 1.6s;
      }
      .pulse-ring:nth-child(4) {
        animation-delay: 2.4s;
      }

      .btn-start-test {
        position: relative;
        width: 170px;
        height: 170px;
        border-radius: 50%;
        border: none;
        background: linear-gradient(135deg, var(--primary), var(--secondary));
        color: #ffffff;
        display: flex;
        flex-direction: column;
        align-items: center;
        justify-content: center;
        gap: 12px;
        cursor: pointer;
        box-shadow:
          0 16px 40px rgba(30, 58, 138, 0.3),
          inset 0 2px 4px rgba(255, 255, 255, 0.3);
        /* 讓按鈕在閒置時帶有自然的微呼吸感 */
        animation: button-breath 4s infinite ease-in-out;
        transition: all 0.4s cubic-bezier(0.175, 0.885, 0.32, 1.275);
      }

      .btn-start-test i {
        font-size: 2.8rem;
        transition: transform 0.4s ease;
        text-shadow: 0 4px 10px rgba(0, 0, 0, 0.15);
      }

      .btn-start-test span {
        font-size: 1.2rem;
        font-weight: 800;
        letter-spacing: 4px;
        text-indent: 4px; /* 修正因字距產生的微偏心 */
        text-shadow: 0 2px 6px rgba(0, 0, 0, 0.15);
      }

      /* 按鈕懸浮、點擊與動畫 */
      .btn-start-test:hover {
        animation: none; /* 懸浮時暫停呼吸動畫 */
        transform: scale(1.08);
        box-shadow:
          0 24px 50px rgba(15, 118, 110, 0.45),
          inset 0 2px 6px rgba(255, 255, 255, 0.4);
        background: linear-gradient(
          135deg,
          var(--primary-dark),
          var(--secondary-light)
        );
      }

      .btn-start-test:hover i {
        transform: rotate(15deg) scale(1.1);
      }

      .btn-start-test:active {
        transform: scale(0.95);
        box-shadow: 0 8px 20px rgba(30, 58, 138, 0.4);
      }

      /* 頁尾 */
      .footer-info {
        color: var(--text-light);
        font-size: 0.82rem;
        text-align: center;
        z-index: 1;
      }

      /* 升級版：雷達擴散特效動畫 */
      @keyframes radar-pulse-enhanced {
        0% {
          transform: scale(0.95);
          opacity: 1;
        }
        30% {
          opacity: 0.6;
        }
        100% {
          transform: scale(1.8);
          opacity: 0;
        }
      }

      /* 按鈕微呼吸特效動畫 */
      @keyframes button-breath {
        0%,
        100% {
          transform: scale(1);
          box-shadow: 0 16px 40px rgba(30, 58, 138, 0.3);
        }
        50% {
          transform: scale(1.03);
          box-shadow: 0 20px 45px rgba(15, 118, 110, 0.35);
        }
      }
    </style>
  </head>

  <body>
    <div class="tablet-shell">
      <header class="app-header">
        <div class="brand-mark">
          <div class="logo-box">
            <img src="/assets/logo.png" alt="Logo" />
          </div>
          <h1>FongAI</h1>
        </div>
        <!-- <button class="btn-logout" onclick="location.href = 'index.html'">
          <i class="fa-solid fa-arrow-right-from-bracket"></i>登出系統
        </button> -->
      </header>

      <main class="main-action-area">
        <div class="welcome-meta">
          <h2>您好，歡迎使用 FongAI</h2>
        </div>

        <div class="radar-pulse-box">
          <div class="pulse-ring"></div>
          <div class="pulse-ring"></div>
          <div class="pulse-ring"></div>
          <div class="pulse-ring"></div>
          <button class="btn-start-test" onclick="startAssessment()">
            <i class="fa-solid fa-circle-play"></i>
            <span>開始鑑測</span>
          </button>
        </div>
      </main>

      <footer class="footer-info">© 2026 Fong Health Technology // v2.0</footer>
    </div>

    <script>
      // 依要求已清空內部邏輯，保留空殼 function 以利後續開發綁定
      function startAssessment() {}
    </script>
  </body>
</html>
