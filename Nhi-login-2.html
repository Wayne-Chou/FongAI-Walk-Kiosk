<!doctype html>
<html lang="zh-TW">
  <head>
    <meta charset="UTF-8" />
    <meta
      name="viewport"
      content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no"
    />
    <title>FongAI - 健保卡登入</title>
    <link
      rel="stylesheet"
      href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.2/css/all.min.css"
    />
    <link
      href="https://fonts.googleapis.com/css2?family=Noto+Sans+TC:wght@400;500;700;800&display=swap"
      rel="stylesheet"
    />
    <style>
      :root {
        --bg-main: #f7f3ef;
        --line: #e3d7c8;
        --primary: #6f4e37;
        --primary-dark: #4e342e;
        --secondary: #8a6a4f;
        --secondary-light: #a07e5e;
        --text-dark: #2b2018;
        --text-body: #5c4d40;
        --text-light: #8a7d6f;
        --input-bg: #faf7f3;
        --input-border: #e3d7c8;
        --shadow-lg: 0 24px 60px rgba(60, 40, 28, 0.12);
        --shadow-md: 0 12px 28px rgba(111, 78, 55, 0.08);
      }

      * {
        margin: 0;
        padding: 0;
        box-sizing: border-box;
        font-family: "Noto Sans TC", sans-serif;
        -webkit-tap-highlight-color: transparent;
      }

      body {
        width: 100vw;
        height: 100vh;
        overflow: hidden;
        display: flex;
        align-items: center;
        justify-content: center;
        background: #f3efe9;
      }

      .tablet-shell {
        width: 920px;
        height: 600px;
        background: rgba(255, 255, 255, 0.65);
        border: 1px solid rgba(255, 255, 255, 0.7);
        overflow: hidden;
        box-shadow: var(--shadow-lg);
        backdrop-filter: blur(20px);
        display: flex;
        flex-direction: column;
        padding: 28px 40px;
        position: relative;
      }
      .tablet-shell::before {
        content: "";
        position: absolute;
        width: 320px;
        height: 320px;
        border-radius: 50%;
        background: linear-gradient(
          135deg,
          rgba(111, 78, 55, 0.05),
          rgba(160, 126, 94, 0.05)
        );
        top: -70px;
        right: -70px;
        pointer-events: none;
      }
      .tablet-shell::after {
        content: "";
        position: absolute;
        width: 260px;
        height: 260px;
        border-radius: 50%;
        background: linear-gradient(
          135deg,
          rgba(160, 126, 94, 0.05),
          rgba(111, 78, 55, 0.04)
        );
        bottom: -80px;
        left: -60px;
        pointer-events: none;
      }

      /* ── 頂部列：品牌 + 返回 ── */
      .top-bar {
        display: flex;
        justify-content: space-between;
        align-items: center;
        z-index: 1;
        flex-shrink: 0;
      }
      .brand-mark {
        display: flex;
        align-items: center;
        gap: 12px;
      }
      .logo-box {
        width: 44px;
        height: 44px;
        border-radius: 50%;
        background: linear-gradient(
          135deg,
          var(--primary),
          var(--primary-dark)
        );
        display: grid;
        place-items: center;
        box-shadow: 0 8px 18px rgba(111, 78, 55, 0.18);
      }
      .logo-box img {
        width: 24px;
        height: auto;
      }
      .brand-mark h1 {
        font-size: 1.5rem;
        font-weight: 800;
        color: var(--primary);
        letter-spacing: 0.5px;
      }
      .btn-back {
        background: rgba(255, 255, 255, 0.7);
        border: 1px solid var(--line);
        color: var(--text-body);
        padding: 9px 18px;
        border-radius: 12px;
        font-size: 0.88rem;
        font-weight: 700;
        cursor: pointer;
        display: flex;
        align-items: center;
        gap: 8px;
        transition: all 0.2s;
        backdrop-filter: blur(5px);
      }
      .btn-back:hover {
        background: #fff;
        transform: translateY(-1px);
        box-shadow: var(--shadow-md);
      }
      .btn-back:active {
        transform: scale(0.97);
      }

      /* ── 中央主區 ── */
      .main-stage {
        flex: 1;
        display: flex;
        flex-direction: column;
        align-items: center;
        justify-content: center;
        gap: 26px;
        z-index: 1;
      }

      /* 插卡示意圖（之後換成實際圖片） */
      .card-slot {
        width: 420px;
      }
      .card-slot img {
        width: 100%;
      }

      /* 讀取中狀態 */
      .reading-status {
        display: flex;
        flex-direction: column;
        align-items: center;
        gap: 10px;
      }
      .reading-line {
        display: flex;
        align-items: center;
        gap: 16px;
      }

      .reading-text {
        font-size: 1.9rem;
        font-weight: 800;
        color: var(--primary);
        letter-spacing: 3px;
      }
      .reading-sub {
        font-size: 0.95rem;
        color: var(--text-light);
        letter-spacing: 1px;
      }

      /* ── 頁尾 ── */
      .footer-info {
        text-align: center;
        color: var(--text-light);
        font-size: 0.78rem;
        z-index: 1;
        flex-shrink: 0;
      }
    </style>
  </head>
  <body>
    <div class="tablet-shell">
      <!-- 頂部列 -->
      <header class="top-bar">
        <div class="brand-mark">
          <div class="logo-box">
            <img
              src="/assets/logo.png"
              alt="Logo"
              onerror="this.style.display = 'none'"
            />
          </div>
          <h1>FongAI</h1>
        </div>
      </header>

      <main class="main-stage">
        <div class="card-slot">
          <img
            src="https://raw.githubusercontent.com/Wayne-Chou/FongAI-Walk-Kiosk/refs/heads/main/assets/insert-nhi-card.png"
            alt=""
          />
        </div>

        <!-- 讀取中狀態 -->
        <div class="reading-status">
          <div class="reading-line">
            <div class="reading-text">讀取中…</div>
          </div>
          <div class="reading-sub">正在驗證健保卡，請勿拔出</div>
        </div>
      </main>

      <!-- 頁尾 -->
      <footer class="footer-info">© 2026 Fong Health Technology // v2.0</footer>
    </div>
  </body>
</html>
